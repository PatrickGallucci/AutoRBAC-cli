name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

# id-token: write lets the job request a GitHub OIDC token, which NuGet Trusted
# Publishing exchanges for a short-lived API key (no long-lived secret to store).
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Your nuget.org username (profile name, NOT email). Stored as a secret so the
      # workflow stays green until Trusted Publishing is configured (see README).
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet test -c Release

      - name: Pack the tool
        run: dotnet pack src/AutoRbac.Cli -c Release -o ./artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived NuGet
      # API key. Request it immediately before pushing (the temp key lasts ~1 hour).
      - name: NuGet login (OIDC -> short-lived API key)
        id: nuget-login
        if: env.NUGET_USER != ''
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet (Trusted Publishing)
        if: env.NUGET_USER != ''
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Skip publish (Trusted Publishing not configured)
        if: env.NUGET_USER == ''
        run: echo "::warning::Trusted Publishing not configured. Add a policy on nuget.org for this repo + workflow 'release.yml', set the NUGET_USER secret, then re-run. See README > Publishing."

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
